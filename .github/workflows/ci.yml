name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 先构建：@maxoyed/ode-vue / @maxoyed/ode-react 的类型检查依赖 @maxoyed/ode-core 的 dist 产物
      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Test
        run: pnpm -r run test
